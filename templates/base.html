<!DOCTYPE html>
<html lang="es"> <!-- Idioma español para accesibilidad -->
<head>
  <meta charset="UTF-8"> <!-- Codificación para caracteres latinos -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Responsive en móviles -->
  <title>{% block title %}Sistema Estudiantes{% endblock %}</title> <!-- Bloque dinámico de título -->

  <!-- Bootstrap (estilos rápidos y consistentes) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light"> <!-- Fondo claro para mejor lectura -->

  <!-- Barra de navegación simple -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">Sistema Estudiantes</a>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="{{ url_for('listar_cursos') }}">📚 Cursos</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('create') }}">➕ Nuevo</a>
        </div>
    </div>
</nav>


  <!-- Contenido principal -->
  <main class="container">
    <!-- Bloque para mensajes flash (éxito/error) -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info" role="alert">
          {% for m in messages %}{{ m }}<br>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <!-- Aquí insertan su contenido las páginas hijas -->
    {% block content %}{% endblock %}
  </main>

  <!-- JS de Bootstrap (opcional para componentes interactivos) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
